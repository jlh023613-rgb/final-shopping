<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网上商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1f6feb;
            --primary-dark: #164ea6;
            --primary-light: #e8f1ff;
            --accent: #18a0fb;
            --bg: #f3f6fb;
            --card: #ffffff;
            --border: #d7e0ea;
            --text-dark: #10243e;
            --text-secondary: #3f5774;
            --text-muted: #667d99;
            --shadow-soft: 0 10px 30px rgba(16, 36, 62, 0.08);
            --radius-lg: 16px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            font-size: 14px;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); border-radius: 10px; }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }

        .topbar-shell {
            background: #f8f9fa;
            border-bottom: 1px solid #e6ebf1;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .topbar-inner {
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .topbar-links {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .topbar-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-weight: 600;
            transition: transform .2s ease, color .2s ease;
        }
        .topbar-link svg {
            width: 14px;
            height: 14px;
            opacity: 0.85;
        }
        .topbar-link:hover {
            transform: translateY(-1px);
            color: transparent;
            background-image: linear-gradient(90deg, #1f6feb 0%, #18a0fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }
        @media (prefers-color-scheme: dark) {
            .topbar-shell {
                background: #1b2128;
                border-bottom-color: #2d3946;
                color: #c6d2df;
            }
            .topbar-link {
                color: #d4deea;
            }
        }

        .site-nav {
            border-bottom: 1px solid rgba(31, 111, 235, 0.12);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px) saturate(140%);
            box-shadow: 0 8px 24px rgba(16, 36, 62, 0.08);
            padding: 0;
        }
        .site-nav.nav-home { top: 40px; }
        .site-nav .nav-wrap {
            min-height: 70px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .brand-logo {
            color: var(--text-dark);
            font-weight: 800;
            font-size: 1.38rem;
            letter-spacing: .2px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            box-shadow: 0 0 0 5px rgba(31, 111, 235, 0.15);
        }

        .nav-search {
            flex: 1;
            max-width: 620px;
            margin: 0 auto;
        }
        .search-shell {
            background: #fff;
            border: 1.5px solid #c9d7ea;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        .search-shell:focus-within {
            border-color: #5ea4ff;
            box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12);
        }
        .search-shell input {
            border: none;
            background: transparent;
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-dark);
            flex: 1;
        }
        .search-shell input:focus { outline: none; }
        .search-btn {
            border: none;
            color: #fff;
            background: linear-gradient(135deg, #1f6feb 0%, #18a0fb 100%);
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: filter .2s ease, transform .2s ease;
        }
        .search-btn:hover { filter: brightness(.95); transform: translateY(-1px); }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
        }
        .nav-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.8);
            border: 1px solid #dbe5f2;
            border-radius: 12px;
            padding: 7px 10px;
            font-size: 13px;
            transition: transform .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
            white-space: nowrap;
        }
        .nav-action:hover {
            transform: translateY(-2px);
            color: var(--primary);
            border-color: #9ec2f8;
            box-shadow: 0 8px 14px rgba(31, 111, 235, 0.14);
        }
        .nav-op-icon {
            width: 15px;
            height: 15px;
            display: inline-block;
        }
        .auth-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #d4e2f5;
            color: var(--text-secondary);
            background: #fff;
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .auth-action:hover {
            transform: translateY(-2px);
            border-color: #8ab7f7;
            box-shadow: 0 8px 14px rgba(31, 111, 235, 0.12);
        }
        .auth-action.register {
            color: #fff;
            border-color: transparent;
            background: linear-gradient(135deg, #1f6feb 0%, #18a0fb 100%);
        }

        .site-nav.nav-compact .nav-wrap { min-height: 58px; }
        .site-nav.nav-compact .nav-search { max-width: 360px; }
        .site-nav.nav-compact .nav-action-label { display: none; }
        .site-nav.nav-compact .nav-action { padding: 7px 9px; }

        @media (max-width: 991.98px) {
            .topbar-inner { min-height: 36px; }
            .topbar-welcome { display: none; }
            .site-nav.nav-home { top: 36px; }
            .site-nav .nav-wrap {
                min-height: 64px;
                gap: 10px;
            }
            .nav-search {
                order: 3;
                width: 100%;
                max-width: none;
                margin: 8px 0 10px;
            }
            .nav-actions {
                margin-left: auto;
            }
            .nav-action-label { display: none; }
            .auth-action { padding: 7px 10px; }
        }
        @media (max-width: 576px) {
            .topbar-links { gap: 10px; }
            .brand-logo { font-size: 1.15rem; }
            .search-shell input { padding: 9px 12px; font-size: 13px; }
            .search-btn { padding: 9px 14px; }
        }
    </style>
</head>
<body class="bg-light">
<style>
    :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
    body { background-color: var(--bg); }
    .page-title { font-size: 16px; font-weight: 600; color: var(--text-dark); padding-left: 10px; border-left: 3px solid var(--primary); margin-bottom: 16px; }
    .order-card { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
    .order-header { display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .order-body { padding: 12px 14px; display: flex; align-items: center; }
    .order-img { width: 70px; height: 70px; object-fit: contain; background: #fff; border: 1px solid var(--border); border-radius: 2px; margin-right: 12px; flex-shrink: 0; }
    .order-info { flex-grow: 1; min-width: 0; }
    .order-name { font-size: 13px; color: var(--text-dark); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .order-price { font-size: 16px; color: var(--primary); font-weight: 700; }
    .order-qty { font-size: 12px; color: var(--text-muted); margin-left: 6px; }
    .order-addr { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .order-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; margin-left: 16px; }
    .status-badge { font-size: 12px; padding: 2px 8px; border-radius: 2px; font-weight: 500; }
    .status-pending { background: #FFF8E1; color: #E65100; }
    .status-shipping { background: #E3F2FD; color: #1565C0; }
    .status-delivered { background: #E8F5E9; color: #2E7D32; }
    .status-completed { background: #E8F5E9; color: #1B5E20; }
    .status-cancelled { background: #FBE9E7; color: #BF360C; }
    .status-refunded { background: #F3E5F5; color: #6A1B9A; }
    .status-reviewed { background: #E8EAF6; color: #283593; }
    .action-btn { padding: 3px 12px; font-size: 12px; border-radius: 2px; border: 1px solid var(--border); background: white; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .action-btn:hover { border-color: var(--primary); color: var(--primary); }
    .action-btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .action-btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }
    .action-btn-danger { background: white; color: #d32f2f; border-color: #d32f2f; }
    .action-btn-danger:hover { background: #d32f2f; color: white; }
    .action-btn-success { background: white; color: #2e7d32; border-color: #2e7d32; }
    .action-btn-success:hover { background: #2e7d32; color: white; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--text-muted); }
    .empty-state p { margin-top: 12px; font-size: 14px; }
    .btn-goshop { background: var(--primary); color: white; border: none; padding: 6px 20px; border-radius: 2px; font-size: 13px; }
    .btn-goshop:hover { background: var(--primary-dark); color: white; }
    .after-sale-box { margin-top: 8px; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: #fafcff; font-size: 12px; }
    .after-sale-title { font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
    .after-sale-meta { color: var(--text-secondary); line-height: 1.6; white-space: pre-line; }
    .after-sale-success { background: #f3fff6; border-color: #cdeed8; }
    .after-sale-danger { background: #fff6f6; border-color: #ffd7d7; }
    .after-sale-warning { background: #fffdf3; border-color: #ffe8b0; }
</style>

<nav class="navbar navbar-expand-lg sticky-top site-nav">
    <div class="container nav-wrap">
        <a class="navbar-brand brand-logo" href="/">
            <span class="brand-dot"></span>
            网上商城
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <form class="nav-search" action="/" method="get">
                <div class="search-shell">
                    <input type="text" name="keyword" value="" placeholder="搜索商品、品牌、店铺...">
                    <button class="search-btn" type="submit" aria-label="搜索">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                    </button>
                </div>
            </form>

            

            <div class="nav-actions">
                <a href="/cart" class="nav-action" title="购物车">
                    <svg class="nav-op-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M5 6h16l-1.5 8h-12z"/><path d="M3 3h2l1 3"/></svg>
                    <span class="nav-action-label">购物车</span>
                    <span class="cart-badge" style="display:none; background: var(--primary); color: white; font-size: 10px; padding: 1px 6px; border-radius: 12px;">0</span>
                </a>
                <a href="/user/orders" class="nav-action" title="我的订单">
                    <svg class="nav-op-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h12v20l-6-3-6 3z"/></svg>
                    <span class="nav-action-label">我的订单</span>
                </a>
                <a href="/user/center" class="nav-action" title="用户中心">
                    <svg class="nav-op-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c2-4 6-6 8-6s6 2 8 6"/></svg>
                    <span class="nav-action-label">用户中心</span>
                </a>
                <a href="/user/logout" class="nav-action" title="退出">
                    <svg class="nav-op-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M20 3v18"/></svg>
                    <span class="nav-action-label">退出</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-3">
    <div class="page-title">我的订单</div>
    
    
    
    <div class="empty-state">
        <p>暂无订单</p>
        <a href="/" class="btn btn-goshop">去购物</a>
    </div>
    
</main>

<footer style="background:#0f1a2a; color:#96a8bf; text-align:center; padding:20px 0; margin-top:40px; font-size:12px;">
    <div class="container">
        <div style="margin-bottom:8px;">
            <a href="#" style="color:#96a8bf; margin:0 15px;">关于我们</a>
            <a href="#" style="color:#96a8bf; margin:0 15px;">联系客服</a>
            <a href="#" style="color:#96a8bf; margin:0 15px;">帮助中心</a>
        </div>
        <div>&copy; 2026 网上商城 版权所有</div>
    </div>
</footer>
<div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
        });

        function updateCartBadge() {
            var badge = document.querySelector('.cart-badge');
            if (!badge) return;

            fetch('/cart/count')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(function() {
                    badge.style.display = 'none';
                });
        }
    </script>
</div>
</body>
</html>
