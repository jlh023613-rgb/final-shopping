spring.datasource.url=jdbc:mysql://localhost:3306/shopping?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL init: run schema.sql first, then data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Scan local image assets on startup and import missing products
image.scan.enabled=true

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.shopping.entity
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.example.shopping.mapper=debug

spring.thymeleaf.cache=false