<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D0628;
            --bg-gradient-start: #1E0A3C;
            --bg-card: rgba(30, 15, 50, 0.95);
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --primary-light: #A78BFA;
            --primary-glow: rgba(124, 58, 237, 0.5);
            --text-white: #F5F3FF;
            --text-gray: #C4B5FD;
            --text-muted: #8B5CF6;
            --border: #4C1D95;
            --input-bg: #1E0A3C;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-dark) 50%, #0D0628 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(167, 139, 250, 0.05) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .brand-header {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        .brand-text {
            color: var(--text-white);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .brand-sub {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.8;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 0 40px var(--primary-glow),
                0 0 80px rgba(124, 58, 237, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--primary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            pointer-events: none;
        }
        .card-title {
            color: var(--text-white);
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .card-subtitle {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            margin-bottom: 28px;
            opacity: 0.7;
        }
        .form-label {
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text-white);
            transition: all 0.2s;
        }
        .form-control::placeholder {
            color: rgba(139, 92, 246, 0.5);
        }
        .form-control:focus {
            background: var(--input-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            color: var(--text-white);
        }
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 0 25px var(--primary-glow);
            transform: translateY(-1px);
        }
        .alert {
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
            border: 1px solid;
        }
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
        }
        .admin-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .admin-icon::before {
            content: '⚙';
            font-size: 24px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="brand-header">
        <div class="brand-text">管理员登录</div>
        <div class="brand-sub">仅限管理员访问</div>
    </div>
    
    <div class="login-card">
        <div class="admin-icon"></div>
        <div class="card-title">管理控制台</div>
        <div class="card-subtitle">请输入管理员账号密码</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form method="post" action="/admin/login">
            <div class="mb-3">
                <label class="form-label">管理员账号</label>
                <input type="text" name="username" class="form-control" placeholder="请输入管理员账号" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-login">登录</button>
        </form>
    </div>
</body>
</html>
