<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-width: 420px; width: 100%; }
        .btn-login { background: linear-gradient(to right, #1a1a2e, #0f3460); color: white; border: none; border-radius: 25px; padding: 10px; font-weight: 600; }
        .btn-login:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<div class="login-card">
    <h3 class="text-center fw-bold mb-4"><i class="bi bi-shield-lock me-2" style="color: #0f3460;"></i>管理员登录</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form method="post" action="/admin/login">
        <div class="mb-3">
            <label class="form-label">管理员账号</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100">登录</button>
    </form>
</div>
</body>
</html>
