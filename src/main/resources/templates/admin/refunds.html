<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退款管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080C14;
            --bg-sidebar: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --primary-light: #A78BFA;
            --secondary: #2563EB;
            --primary-glow: rgba(124, 58, 237, 0.4);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --success: #3FB950;
            --warning: #D29922;
            --danger: #F85149;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            color: var(--text-white);
            margin: 0;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            min-height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .sidebar-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .sidebar-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }
        .menu-group {
            padding: 12px 16px 8px;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .menu-group:first-of-type { border-top: none; margin-top: 0; }
        .nav-link {
            color: var(--text-gray);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary-light);
            border-left-color: var(--primary);
        }
        .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: white;
            font-weight: 500;
            border-left-color: var(--primary);
        }
        .nav-link .icon { font-size: 16px; width: 20px; text-align: center; }
        .nav-link.logout { color: var(--danger); position: absolute; bottom: 20px; width: 100%; }
        .nav-link.logout:hover {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border-left-color: var(--danger);
        }
        .main-content {
            margin-left: 220px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-white);
            margin: 0 0 20px 0;
        }
        .refund-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
            overflow: hidden;
        }
        .refund-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .refund-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(124, 58, 237, 0.1);
            border-bottom: 1px solid var(--border);
        }
        .refund-body { padding: 16px 20px; }
        .badge {
            font-size: 11px;
            font-weight: 500;
            border-radius: 6px;
            padding: 4px 10px;
        }
        .badge-pending { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .badge-approved { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-rejected { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        .info-row { font-size: 13px; margin-bottom: 8px; }
        .info-label { color: var(--text-muted); }
        .info-value { color: var(--text-white); }
        .reason-text {
            color: var(--text-gray);
            font-size: 13px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 8px;
            line-height: 1.5;
        }
        .btn-action {
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 20px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-approve {
            background: var(--success);
            color: white;
        }
        .btn-approve:hover {
            background: #2EA043;
            color: white;
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.4);
        }
        .btn-reject {
            background: var(--danger);
            color: white;
        }
        .btn-reject:hover {
            background: #DA3633;
            color: white;
            box-shadow: 0 0 10px rgba(248, 81, 73, 0.4);
        }
        .result-box {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-gray);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .modal-header {
            background: rgba(248, 81, 73, 0.1);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
        }
        .modal-header .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-white);
        }
        .modal-header .btn-close { filter: invert(1); }
        .modal-body { padding: 20px; }
        .modal-footer {
            border-top: 1px solid var(--border);
            padding: 16px 20px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 8px;
        }
        .form-control {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-white);
            padding: 10px 14px;
        }
        .form-control:focus {
            background: var(--bg-dark);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            color: var(--text-white);
        }
        .btn-cancel {
            background: var(--bg-card-hover);
            color: var(--text-gray);
            border: 1px solid var(--border);
        }
        .btn-cancel:hover {
            background: var(--border);
            color: white;
        }
        .text-muted { color: var(--text-muted) !important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-icon">⚙</div>
        <h5 class="sidebar-title">管理控制台</h5>
    </div>
    <nav class="nav flex-column" style="flex-direction: column !important;">
        <div class="menu-group">概览</div>
        <a class="nav-link" href="/admin/dashboard"><span class="icon">📊</span>概览</a>
        <div class="menu-group">商家管理</div>
        <a class="nav-link" href="/admin/merchants"><span class="icon">🏪</span>商家管理</a>
        <div class="menu-group">订单管理</div>
        <a class="nav-link" href="/admin/order-list"><span class="icon">📦</span>订单列表</a>
        <a class="nav-link active" href="/admin/refunds"><span class="icon">💰</span>退款管理</a>
        <div class="menu-group">投诉管理</div>
        <a class="nav-link" href="/admin/complaints"><span class="icon">📝</span>投诉管理</a>
        <a class="nav-link logout" href="/admin/logout"><span class="icon">🚪</span>退出登录</a>
    </nav>
</div>
<div class="main-content">
    <h1 class="page-title">退款管理</h1>

    <div th:if="${refunds == null or refunds.isEmpty()}" class="empty-state">
        <p>暂无退款申请</p>
    </div>

    <div th:each="refund : ${refunds}" class="refund-card">
        <div class="refund-header">
            <div>
                <span class="text-muted">订单号：</span>
                <span style="font-weight:600;" th:text="${refund.orderNo}"></span>
                <span class="text-muted" style="margin-left: 16px; font-size: 12px;" th:text="${#temporals.format(refund.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div>
                <span class="badge badge-pending" th:if="${refund.status == 'pending'}">待处理</span>
                <span class="badge badge-approved" th:if="${refund.status == 'approved'}">已同意</span>
                <span class="badge badge-rejected" th:if="${refund.status == 'rejected'}">已拒绝</span>
            </div>
        </div>
        <div class="refund-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="info-row"><span class="info-label">商品：</span><span class="info-value" th:text="${refund.productName}"></span></div>
                    <div class="info-row"><span class="info-label">买家：</span><span class="info-value" th:text="${refund.username}"></span></div>
                    <div class="info-row"><span class="info-label">商家：</span><span class="info-value" th:text="${refund.merchantShopName}"></span></div>
                    <div class="info-row"><span class="info-label">退款原因：</span></div>
                    <div class="reason-text" th:text="${refund.reason}"></div>
                </div>
                <div class="col-md-6">
                    <div th:if="${refund.status == 'pending'}">
                        <form th:action="@{/admin/refund/approve/{id}(id=${refund.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-action btn-approve">同意退款</button>
                        </form>
                        <button type="button" class="btn-action btn-reject" data-bs-toggle="modal" th:attr="data-bs-target='#rejectModal' + ${refund.id}">拒绝退款</button>

                        <div class="modal fade" th:id="'rejectModal' + ${refund.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">拒绝退款</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/admin/refund/reject/{id}(id=${refund.id})}" method="post">
                                        <div class="modal-body">
                                            <div class="mb-3">
                                                <label class="form-label">拒绝原因</label>
                                                <textarea name="result" class="form-control" rows="3" required></textarea>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn-action btn-cancel" data-bs-dismiss="modal">取消</button>
                                            <button type="submit" class="btn-action btn-reject">确认拒绝</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${refund.status != 'pending'}">
                        <div class="info-row"><span class="info-label">处理结果：</span></div>
                        <div class="result-box" th:text="${refund.result}"></div>
                        <div class="info-row" style="margin-top:10px" th:if="${refund.processedAt != null}">
                            <span class="info-label">处理时间：</span>
                            <span class="info-value" th:text="${#temporals.format(refund.processedAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
