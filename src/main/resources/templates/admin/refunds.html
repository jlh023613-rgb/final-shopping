<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退款管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: #0d1117;
            --bg-card: #161b22;
            --primary: #4f8cff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--bg-dark); color: var(--text-main); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        .sidebar { position: fixed; inset: 0 auto 0 0; width: 228px; background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .sidebar-header { padding: 20px 18px; font-size: 16px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .menu-title { padding: 14px 18px 8px; font-size: 11px; letter-spacing: 1px; color: #6e7681; text-transform: uppercase; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 11px 18px; color: var(--text-sub); text-decoration: none; border-left: 3px solid transparent; transition: .2s ease; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(79,140,255,.12); border-left-color: var(--primary); }
        .main { margin-left: 228px; padding: 28px; }
        .page-title { margin: 0 0 20px; font-size: 24px; font-weight: 700; }
        .refund-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
        .refund-head { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid var(--border); background: rgba(79,140,255,.05); }
        .refund-body { padding: 18px 20px; }
        .badge-state { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .state-pending { background: rgba(210,153,34,.18); color: #f3c969; }
        .state-escalated { background: rgba(79,140,255,.18); color: #9ec1ff; }
        .state-approved { background: rgba(63,185,80,.16); color: #7ee787; }
        .state-rejected { background: rgba(248,81,73,.16); color: #ff938a; }
        .meta { color: var(--text-sub); font-size: 13px; line-height: 1.8; }
        .reason-box, .result-box { border-radius: 14px; padding: 14px 16px; line-height: 1.8; font-size: 13px; white-space: pre-line; }
        .reason-box { background: #0f141b; border: 1px solid var(--border); }
        .result-box { margin-top: 12px; background: rgba(255,255,255,.04); border: 1px solid var(--border); }
        .btn-approve, .btn-reject, .btn-cancel { border: none; border-radius: 12px; padding: 10px 16px; font-size: 13px; font-weight: 700; }
        .btn-approve { background: var(--success); color: #fff; }
        .btn-reject { background: rgba(248,81,73,.16); color: #ff938a; border: 1px solid rgba(248,81,73,.25); }
        .btn-cancel { background: rgba(255,255,255,.06); color: #fff; border: 1px solid var(--border); }
        .modal-content { background: var(--bg-card); color: #fff; border: 1px solid var(--border); border-radius: 18px; }
        .modal-header, .modal-footer { border-color: var(--border); }
        .btn-close { filter: invert(1); }
        .form-control { background: #0f141b; color: #fff; border-color: var(--border); }
        .form-control:focus { background: #0f141b; color: #fff; border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(79,140,255,.18); }
        .empty-box { padding: 80px 20px; text-align: center; color: var(--text-sub); background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">管理员控制台</div>
    <div class="menu-title">工作台</div>
    <a class="nav-link" href="/admin/dashboard">概览</a>
    <div class="menu-title">审核管理</div>
    <a class="nav-link" href="/admin/merchants">商家管理</a>
    <a class="nav-link" href="/admin/product-applications">商品申请</a>
    <div class="menu-title">异常订单</div>
    <a class="nav-link" href="/admin/order-list">异常订单列表</a>
    <a class="nav-link" href="/admin/complaints">投诉管理</a>
    <a class="nav-link active" href="/admin/refunds">退款管理</a>
    <div class="menu-title">退出</div>
    <a class="nav-link" href="/admin/logout">退出登录</a>
</div>

<div class="main">
    <h1 class="page-title">退款管理</h1>

    <div th:if="${refunds == null or refunds.isEmpty()}" class="empty-box">当前没有退款申请</div>

    <div th:each="refund : ${refunds}" class="refund-card">
        <div class="refund-head">
            <div>
                <div style="font-size: 16px; font-weight: 700;">订单号：<span th:text="${refund.orderNo}"></span></div>
                <div class="meta">
                    店铺：<span th:text="${refund.merchantShopName}"></span><br>
                    商品：<span th:text="${refund.productName}"></span><br>
                    用户：<span th:text="${refund.username}"></span>
                </div>
            </div>
            <div style="text-align: right;">
                <span th:if="${refund.status == 'pending'}" class="badge-state state-pending">待处理</span>
                <span th:if="${refund.status == 'escalated'}" class="badge-state state-escalated">管理员介入中</span>
                <span th:if="${refund.status == 'approved'}" class="badge-state state-approved">退款成功</span>
                <span th:if="${refund.status == 'rejected'}" class="badge-state state-rejected">退款失败</span>
                <div class="meta mt-2" th:text="${refund.createdAt != null ? #temporals.format(refund.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></div>
            </div>
        </div>
        <div class="refund-body">
            <div class="reason-box" th:text="${refund.reason}"></div>

            <div th:if="${refund.status == 'pending' or refund.status == 'escalated'}" class="mt-3 d-flex gap-2 flex-wrap">
                <form th:action="@{/admin/refund/approve/{id}(id=${refund.id})}" method="post">
                    <button type="submit" class="btn-approve">同意退款</button>
                </form>
                <button type="button" class="btn-reject" data-bs-toggle="modal" th:attr="data-bs-target='#rejectRefundModal' + ${refund.id}">拒绝退款</button>
            </div>

            <div th:if="${refund.status != 'pending' and refund.status != 'escalated'}" class="result-box" th:text="${refund.result != null and !refund.result.isEmpty() ? refund.result : '管理员已处理该退款申请'}"></div>
            <div th:if="${refund.status != 'pending' and refund.status != 'escalated' and refund.processedAt != null}" class="meta mt-2">
                处理时间：<span th:text="${#temporals.format(refund.processedAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
        </div>
    </div>
</div>

<th:block th:each="refund : ${refunds}">
    <div class="modal fade" th:id="'rejectRefundModal' + ${refund.id}" tabindex="-1" th:if="${refund.status == 'pending' or refund.status == 'escalated'}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">拒绝退款</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/refund/reject/{id}(id=${refund.id})}" method="post">
                    <div class="modal-body">
                        <label class="form-label">拒绝原因</label>
                        <textarea name="result" class="form-control" rows="3" placeholder="请输入退款失败原因" required></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-reject">确认拒绝</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
