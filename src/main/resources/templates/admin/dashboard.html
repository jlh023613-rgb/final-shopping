<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: #0d1117;
            --bg-card: #161b22;
            --primary: #4f8cff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --info: #7c3aed;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--bg-dark); color: var(--text-main); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        .sidebar { position: fixed; inset: 0 auto 0 0; width: 228px; background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .sidebar-header { padding: 20px 18px; font-size: 16px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .menu-title { padding: 14px 18px 8px; font-size: 11px; letter-spacing: 1px; color: #6e7681; text-transform: uppercase; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 11px 18px; color: var(--text-sub); text-decoration: none; border-left: 3px solid transparent; transition: .2s ease; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(79,140,255,.12); border-left-color: var(--primary); }
        .main { margin-left: 228px; padding: 28px; }
        .welcome { font-size: 28px; font-weight: 700; margin-bottom: 22px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { border-radius: 18px; padding: 22px; color: #fff; box-shadow: 0 18px 40px rgba(0,0,0,.24); }
        .stat-card .label { font-size: 13px; opacity: .86; margin-bottom: 10px; }
        .stat-card .value { font-size: 34px; font-weight: 800; }
        .stat-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .stat-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .stat-green { background: linear-gradient(135deg, #16a34a, #15803d); }
        .stat-orange { background: linear-gradient(135deg, #d97706, #b45309); }
        .stat-red { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .quick-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; }
        .quick-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .quick-actions { display: flex; flex-wrap: wrap; gap: 12px; }
        .quick-btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 18px; border-radius: 14px; text-decoration: none; color: #fff; font-weight: 700; font-size: 13px; }
        .quick-btn.blue { background: rgba(79,140,255,.16); border: 1px solid rgba(79,140,255,.22); }
        .quick-btn.orange { background: rgba(210,153,34,.18); border: 1px solid rgba(210,153,34,.24); }
        .quick-btn.red { background: rgba(248,81,73,.16); border: 1px solid rgba(248,81,73,.24); }
        .quick-btn.purple { background: rgba(124,58,237,.18); border: 1px solid rgba(124,58,237,.24); }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">管理员控制台</div>
    <div class="menu-title">工作台</div>
    <a class="nav-link active" href="/admin/dashboard">概览</a>
    <div class="menu-title">审核管理</div>
    <a class="nav-link" href="/admin/merchants">商家管理</a>
    <a class="nav-link" href="/admin/product-applications">商品申请</a>
    <div class="menu-title">异常订单</div>
    <a class="nav-link" href="/admin/order-list">异常订单列表</a>
    <a class="nav-link" href="/admin/complaints">投诉管理</a>
    <a class="nav-link" href="/admin/refunds">退款管理</a>
    <div class="menu-title">退出</div>
    <a class="nav-link" href="/admin/logout">退出登录</a>
</div>

<div class="main">
    <div class="welcome">管理员，欢迎回来</div>

    <div class="stats">
        <div class="stat-card stat-purple">
            <div class="label">待审核商家</div>
            <div class="value" th:text="${pendingMerchants}">0</div>
        </div>
        <div class="stat-card stat-blue">
            <div class="label">待审核商品申请</div>
            <div class="value" th:text="${pendingProducts}">0</div>
        </div>
        <div class="stat-card stat-green">
            <div class="label">正常营业商家</div>
            <div class="value" th:text="${activeMerchants}">0</div>
        </div>
        <div class="stat-card stat-orange">
            <div class="label">待处理投诉</div>
            <div class="value" th:text="${pendingComplaints}">0</div>
        </div>
        <div class="stat-card stat-red">
            <div class="label">待处理退款</div>
            <div class="value" th:text="${pendingRefunds}">0</div>
        </div>
    </div>

    <div class="quick-box">
        <div class="quick-title">快捷入口</div>
        <div class="quick-actions">
            <a href="/admin/merchants?status=pending" class="quick-btn blue">去审核商家</a>
            <a href="/admin/product-applications?status=0" class="quick-btn purple">去审核商品</a>
            <a href="/admin/complaints?status=pending" class="quick-btn orange">去处理投诉</a>
            <a href="/admin/refunds" class="quick-btn red">去处理退款</a>
            <a href="/admin/order-list" class="quick-btn blue">查看异常订单</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
