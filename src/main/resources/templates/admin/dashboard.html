<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080C14;
            --bg-sidebar: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --primary-light: #A78BFA;
            --secondary: #2563EB;
            --primary-glow: rgba(124, 58, 237, 0.4);
            --secondary-glow: rgba(37, 99, 235, 0.4);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --success: #3FB950;
            --warning: #D29922;
            --danger: #F85149;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            color: var(--text-white);
            margin: 0;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            min-height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .sidebar-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .sidebar-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }
        .menu-group {
            padding: 12px 16px 8px;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .menu-group:first-of-type {
            border-top: none;
            margin-top: 0;
        }
        .nav-link {
            color: var(--text-gray);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary-light);
            border-left-color: var(--primary);
        }
        .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: white;
            font-weight: 500;
            border-left-color: var(--primary);
        }
        .nav-link .icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        .nav-link.logout {
            color: var(--danger);
            margin-top: auto;
        }
        .nav-link.logout:hover {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border-left-color: var(--danger);
        }
        .main-content {
            margin-left: 220px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }
        .welcome-text {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 24px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .stat-card.purple {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }
        .stat-card.blue {
            background: linear-gradient(135deg, var(--secondary) 0%, #1D4ED8 100%);
        }
        .stat-card.green {
            background: linear-gradient(135deg, #16A34A 0%, #15803D 100%);
        }
        .stat-card.red {
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .stat-icon {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 32px;
            opacity: 0.3;
        }
        .stat-label {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }
        .quick-actions {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 16px;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            margin-right: 12px;
            margin-bottom: 8px;
        }
        .action-btn.purple {
            background: rgba(124, 58, 237, 0.2);
            color: var(--primary-light);
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        .action-btn.purple:hover {
            background: rgba(124, 58, 237, 0.3);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .action-btn.blue {
            background: rgba(37, 99, 235, 0.2);
            color: #60A5FA;
            border: 1px solid rgba(37, 99, 235, 0.3);
        }
        .action-btn.blue:hover {
            background: rgba(37, 99, 235, 0.3);
            color: white;
            box-shadow: 0 0 15px var(--secondary-glow);
        }
        .action-btn.red {
            background: rgba(248, 81, 73, 0.2);
            color: #FCA5A5;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .action-btn.red:hover {
            background: rgba(248, 81, 73, 0.3);
            color: white;
            box-shadow: 0 0 15px rgba(248, 81, 73, 0.4);
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-icon">⚙</div>
        <h5 class="sidebar-title">管理控制台</h5>
    </div>
    <nav class="nav flex-column" style="flex-direction: column !important;">
        <div class="menu-group">概览</div>
        <a class="nav-link active" href="/admin/dashboard">
            <span class="icon">📊</span>概览
        </a>
        <div class="menu-group">商家管理</div>
        <a class="nav-link" href="/admin/merchants">
            <span class="icon">🏪</span>商家管理
        </a>
        <div class="menu-group">订单管理</div>
        <a class="nav-link" href="/admin/order-list">
            <span class="icon">📦</span>订单列表
        </a>
        <a class="nav-link" href="/admin/refunds">
            <span class="icon">💰</span>退款管理
        </a>
        <div class="menu-group">投诉管理</div>
        <a class="nav-link" href="/admin/complaints">
            <span class="icon">📝</span>投诉管理
        </a>
        <a class="nav-link logout" href="/admin/logout" style="position: absolute; bottom: 20px; width: 100%;">
            <span class="icon">🚪</span>退出登录
        </a>
    </nav>
</div>
<div class="main-content">
    <div class="welcome-text">管理员你好</div>
    <div class="stat-row">
        <div class="stat-card purple">
            <span class="stat-icon">⏳</span>
            <div class="stat-label">待审核商家</div>
            <div class="stat-number" th:text="${pendingMerchants}">0</div>
        </div>
        <div class="stat-card green">
            <span class="stat-icon">✅</span>
            <div class="stat-label">正常营业商家</div>
            <div class="stat-number" th:text="${activeMerchants}">0</div>
        </div>
        <div class="stat-card blue">
            <span class="stat-icon">📢</span>
            <div class="stat-label">待处理投诉</div>
            <div class="stat-number" th:text="${pendingComplaints}">0</div>
        </div>
        <div class="stat-card red">
            <span class="stat-icon">💳</span>
            <div class="stat-label">待处理退款</div>
            <div class="stat-number" th:text="${pendingRefunds}">0</div>
        </div>
    </div>
    <div class="quick-actions">
        <div class="section-title">快捷操作</div>
        <a href="/admin/merchants?status=pending" class="action-btn purple">
            <span>🔍</span>审核商家
        </a>
        <a href="/admin/complaints?status=pending" class="action-btn blue">
            <span>📋</span>处理投诉
        </a>
        <a href="/admin/refunds" class="action-btn red">
            <span>💵</span>处理退款
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
