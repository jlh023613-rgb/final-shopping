<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --primary: #4f8cff;
            --primary-soft: rgba(79, 140, 255, 0.16);
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 228px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
        }
        .sidebar-header {
            padding: 20px 18px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .menu-title {
            padding: 14px 18px 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #6e7681;
            text-transform: uppercase;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: var(--text-sub);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: .2s ease;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(79, 140, 255, 0.12);
            border-left-color: var(--primary);
        }
        .main {
            margin-left: 228px;
            padding: 28px;
        }
        .page-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .page-head h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-sub);
            text-decoration: none;
            background: var(--bg-card);
            transition: .2s ease;
        }
        .filter-btn.active,
        .filter-btn:hover {
            color: #fff;
            border-color: var(--primary);
            background: var(--primary-soft);
        }
        .card-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
        }
        .table {
            margin: 0;
            color: var(--text-main);
            vertical-align: middle;
        }
        .table th {
            background: rgba(79, 140, 255, 0.08);
            color: #9ec1ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 14px 16px;
            border-color: var(--border);
            white-space: nowrap;
        }
        .table td {
            padding: 16px;
            border-color: var(--border);
            background: var(--bg-card);
        }
        .table tbody tr:hover td { background: var(--bg-card-hover); }
        .shop-thumb {
            width: 72px;
            height: 72px;
            border-radius: 14px;
            object-fit: cover;
            background: #0f141b;
            border: 1px solid var(--border);
        }
        .thumb-fallback {
            width: 72px;
            height: 72px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #10151d;
            color: var(--text-sub);
            border: 1px dashed var(--border);
            font-size: 12px;
        }
        .desc {
            max-width: 260px;
            color: var(--text-sub);
            line-height: 1.7;
            font-size: 13px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(210, 153, 34, 0.18); color: #f3c969; }
        .status-approved { background: rgba(63, 185, 80, 0.16); color: #7ee787; }
        .status-closed { background: rgba(248, 81, 73, 0.16); color: #ff938a; }
        .status-rejected { background: rgba(139, 148, 158, 0.16); color: #b6bec8; }
        .tiny-text { color: var(--text-sub); font-size: 12px; line-height: 1.7; }
        .category-select,
        .form-control {
            background: #0f141b;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .category-select:focus,
        .form-control:focus {
            background: #0f141b;
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(79,140,255,.18);
        }
        .action-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }
        .action-inline {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn-main,
        .btn-sub,
        .btn-danger,
        .btn-warning {
            border: none;
            border-radius: 12px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 600;
        }
        .btn-main { background: var(--primary); color: #fff; }
        .btn-sub { background: rgba(255,255,255,.08); color: #fff; border: 1px solid var(--border); }
        .btn-danger { background: rgba(248,81,73,.16); color: #ff938a; border: 1px solid rgba(248,81,73,.25); }
        .btn-warning { background: rgba(210,153,34,.18); color: #f3c969; border: 1px solid rgba(210,153,34,.25); }
        .btn-main:hover,
        .btn-sub:hover,
        .btn-danger:hover,
        .btn-warning:hover { opacity: .92; }
        .empty-box {
            padding: 80px 20px;
            text-align: center;
            color: var(--text-sub);
        }
        .modal-content {
            background: var(--bg-card);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 18px;
        }
        .modal-header,
        .modal-footer {
            border-color: var(--border);
        }
        .btn-close { filter: invert(1); }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">管理员控制台</div>
    <div class="menu-title">工作台</div>
    <a class="nav-link" href="/admin/dashboard">概览</a>
    <div class="menu-title">审核管理</div>
    <a class="nav-link active" href="/admin/merchants">商家管理</a>
    <a class="nav-link" href="/admin/product-applications">商品申请</a>
    <div class="menu-title">异常订单</div>
    <a class="nav-link" href="/admin/order-list">异常订单列表</a>
    <a class="nav-link" href="/admin/complaints">投诉管理</a>
    <a class="nav-link" href="/admin/refunds">退款管理</a>
    <div class="menu-title">退出</div>
    <a class="nav-link" href="/admin/logout">退出登录</a>
</div>

<div class="main">
    <div class="page-head">
        <h1>商家管理</h1>
        <div class="filters">
            <a href="/admin/merchants" class="filter-btn" th:classappend="${currentStatus == null or currentStatus.isEmpty()} ? ' active'">全部</a>
            <a href="/admin/merchants?status=pending" class="filter-btn" th:classappend="${currentStatus == 'pending'} ? ' active'">待审核</a>
            <a href="/admin/merchants?status=approved" class="filter-btn" th:classappend="${currentStatus == 'approved'} ? ' active'">正常营业</a>
            <a href="/admin/merchants?status=closed" class="filter-btn" th:classappend="${currentStatus == 'closed'} ? ' active'">已关停</a>
            <a href="/admin/merchants?status=rejected" class="filter-btn" th:classappend="${currentStatus == 'rejected'} ? ' active'">已拒绝</a>
        </div>
    </div>

    <div class="card-box">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>店铺图片</th>
                    <th>账号 / 店铺</th>
                    <th>店铺描述</th>
                    <th>分类</th>
                    <th>状态</th>
                    <th>申请时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${merchants}">
                    <td>
                        <img th:if="${m.shopImage != null and !m.shopImage.isEmpty()}" th:src="${m.shopImage}" alt="店铺图片" class="shop-thumb">
                        <div th:if="${m.shopImage == null or m.shopImage.isEmpty()}" class="thumb-fallback">无图片</div>
                    </td>
                    <td>
                        <div style="font-weight: 700;" th:text="${m.shopName}">店铺名称</div>
                        <div class="tiny-text">账号：<span th:text="${m.username}"></span></div>
                    </td>
                    <td>
                        <div class="desc" th:text="${m.shopDescription != null and !m.shopDescription.isEmpty() ? m.shopDescription : '商家暂未填写店铺描述'}"></div>
                    </td>
                    <td>
                        <span th:text="${m.category != null and !m.category.isEmpty() ? m.category : '未分配'}"></span>
                    </td>
                    <td>
                        <span th:if="${m.status == 'pending'}" class="status-badge status-pending">待审核</span>
                        <span th:if="${m.status == 'approved'}" class="status-badge status-approved">正常营业</span>
                        <span th:if="${m.status == 'closed'}" class="status-badge status-closed">已关停</span>
                        <span th:if="${m.status == 'rejected'}" class="status-badge status-rejected">已拒绝</span>
                        <div class="tiny-text mt-2" th:if="${m.status == 'closed' and m.closeReason != null}">
                            原因：<span th:text="${m.closeReason}"></span><br>
                            截止：<span th:text="${m.closeUntil != null ? #temporals.format(m.closeUntil, 'yyyy-MM-dd HH:mm') : '未设置'}"></span>
                        </div>
                    </td>
                    <td class="tiny-text" th:text="${m.createdAt != null ? #temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    <td>
                        <div class="action-stack" th:if="${m.status == 'pending'}">
                            <form th:action="@{/admin/merchant/approve/{id}(id=${m.id})}" method="post" class="action-inline">
                                <select name="category" class="category-select" required>
                                    <option value="">选择经营分类</option>
                                    <option value="phone">手机数码</option>
                                    <option value="computer">电脑办公</option>
                                    <option value="appliance">家用电器</option>
                                    <option value="cloth-shoes">服饰鞋包</option>
                                    <option value="food">食品生鲜</option>
                                    <option value="book">图书文具</option>
                                    <option value="cosmetics">美妆个护</option>
                                    <option value="sports">运动户外</option>
                                </select>
                                <button type="submit" class="btn-main">同意入驻</button>
                            </form>
                            <form th:action="@{/admin/merchant/reject/{id}(id=${m.id})}" method="post" onsubmit="return confirm('确认拒绝该商家入驻申请吗？');">
                                <button type="submit" class="btn-danger">拒绝申请</button>
                            </form>
                        </div>

                        <div class="action-stack" th:if="${m.status == 'approved'}">
                            <button type="button" class="btn-warning" data-bs-toggle="modal" th:attr="data-bs-target='#closeMerchantModal' + ${m.id}">关停店铺</button>
                        </div>

                        <div class="action-stack" th:if="${m.status == 'closed'}">
                            <form th:action="@{/admin/merchant/reopen/{id}(id=${m.id})}" method="post" onsubmit="return confirm('确认恢复该店铺营业吗？');">
                                <button type="submit" class="btn-main">恢复营业</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${merchants == null or merchants.isEmpty()}">
                    <td colspan="7">
                        <div class="empty-box">当前没有符合条件的商家记录</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:each="m : ${merchants}">
    <div class="modal fade" th:id="'closeMerchantModal' + ${m.id}" tabindex="-1" th:if="${m.status == 'approved'}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">关停店铺：<span th:text="${m.shopName}"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/merchant/close/{id}(id=${m.id})}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">关停原因</label>
                            <textarea name="closeReason" class="form-control" rows="3" placeholder="请输入关停原因，商家后台会显示这条公告" required></textarea>
                        </div>
                        <div>
                            <label class="form-label">关停时长</label>
                            <select name="closeDuration" class="form-control" required>
                                <option value="1d">1天</option>
                                <option value="7d" selected>7天</option>
                                <option value="1m">1个月</option>
                                <option value="3m">3个月</option>
                                <option value="1y">1年</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-sub" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-warning">确认关停</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
