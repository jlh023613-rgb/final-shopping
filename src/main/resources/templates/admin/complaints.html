<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投诉管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --primary: #4f8cff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 228px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
        }
        .sidebar-header {
            padding: 20px 18px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .menu-title {
            padding: 14px 18px 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #6e7681;
            text-transform: uppercase;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: var(--text-sub);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: .2s ease;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(79, 140, 255, 0.12);
            border-left-color: var(--primary);
        }
        .main { margin-left: 228px; padding: 28px; }
        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .head h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-sub);
            text-decoration: none;
            background: var(--bg-card);
        }
        .filter-btn.active,
        .filter-btn:hover {
            color: #fff;
            border-color: var(--primary);
            background: rgba(79,140,255,.14);
        }
        .complaint-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,.2);
        }
        .complaint-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 14px;
        }
        .meta { color: var(--text-sub); font-size: 13px; line-height: 1.8; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-pending { background: rgba(210,153,34,.18); color: #f3c969; }
        .status-handled { background: rgba(63,185,80,.16); color: #7ee787; }
        .content-box,
        .result-box {
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-line;
        }
        .content-box { background: #0f141b; border: 1px solid var(--border); }
        .result-box { background: rgba(63,185,80,.08); border: 1px solid rgba(63,185,80,.2); margin-top: 12px; }
        .form-control,
        .form-check-input {
            background: #0f141b;
            color: #fff;
            border-color: var(--border);
        }
        .form-control:focus {
            background: #0f141b;
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(79,140,255,.18);
        }
        .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
        .handle-box {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .btn-submit {
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }
        .close-extra {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border: 1px dashed rgba(248,81,73,.4);
            border-radius: 14px;
            background: rgba(248,81,73,.06);
        }
        .empty-box {
            padding: 80px 20px;
            text-align: center;
            color: var(--text-sub);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
        }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">管理员控制台</div>
    <div class="menu-title">工作台</div>
    <a class="nav-link" href="/admin/dashboard">概览</a>
    <div class="menu-title">审核管理</div>
    <a class="nav-link" href="/admin/merchants">商家管理</a>
    <a class="nav-link" href="/admin/product-applications">商品申请</a>
    <div class="menu-title">异常订单</div>
    <a class="nav-link" href="/admin/order-list">异常订单列表</a>
    <a class="nav-link active" href="/admin/complaints">投诉管理</a>
    <a class="nav-link" href="/admin/refunds">退款管理</a>
    <div class="menu-title">退出</div>
    <a class="nav-link" href="/admin/logout">退出登录</a>
</div>

<div class="main">
    <div class="head">
        <h1>投诉管理</h1>
        <div class="filters">
            <a href="/admin/complaints" class="filter-btn" th:classappend="${currentStatus == null or currentStatus.isEmpty()} ? ' active'">全部</a>
            <a href="/admin/complaints?status=pending" class="filter-btn" th:classappend="${currentStatus == 'pending'} ? ' active'">待处理</a>
            <a href="/admin/complaints?status=handled" class="filter-btn" th:classappend="${currentStatus == 'handled'} ? ' active'">已处理</a>
        </div>
    </div>

    <div th:if="${complaints == null or complaints.isEmpty()}" class="empty-box">当前没有投诉记录</div>

    <div th:each="c : ${complaints}" class="complaint-card">
        <div class="complaint-top">
            <div>
                <div style="font-size: 16px; font-weight: 700;">
                    <span th:text="${c.username}"></span>
                    <span style="color: var(--text-sub); font-weight: 500;">投诉</span>
                    <span th:text="${c.merchantShopName}"></span>
                </div>
                <div class="meta">
                    订单号：<span th:text="${c.orderNo != null ? c.orderNo : '-'}"></span><br>
                    商品：<span th:text="${c.productName != null ? c.productName : '-'}"></span>
                </div>
            </div>
            <div style="text-align: right;">
                <span th:if="${c.status == 'pending'}" class="status-badge status-pending">待处理</span>
                <span th:if="${c.status == 'handled'}" class="status-badge status-handled">已处理</span>
                <div class="meta mt-2" th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></div>
            </div>
        </div>

        <div class="content-box" th:text="${c.content}"></div>

        <div th:if="${c.result != null and !c.result.isEmpty()}" class="result-box" th:text="${c.result}"></div>

        <form th:if="${c.status == 'pending'}" th:action="@{/admin/complaint/handle/{id}(id=${c.id})}" method="post" class="handle-box">
            <div class="mb-3">
                <label class="form-label">处理结果回复</label>
                <textarea name="result" class="form-control" rows="3" placeholder="请输入给用户看的处理说明" required></textarea>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input close-toggle" type="checkbox" name="closeShop" value="true" th:attr="data-target='#closeExtra' + ${c.id}" th:id="'closeShop' + ${c.id}">
                <label class="form-check-label" th:for="'closeShop' + ${c.id}">同时关停该店铺</label>
            </div>
            <div class="close-extra" th:id="'closeExtra' + ${c.id}">
                <div class="mb-3">
                    <label class="form-label">关停原因</label>
                    <textarea name="closeReason" class="form-control" rows="2" placeholder="该原因会展示在商家后台公告中"></textarea>
                </div>
                <div>
                    <label class="form-label">关停时长</label>
                    <select name="closeDuration" class="form-control">
                        <option value="1d">1天</option>
                        <option value="7d" selected>7天</option>
                        <option value="1m">1个月</option>
                        <option value="3m">3个月</option>
                        <option value="1y">1年</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-submit">提交处理结果</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.close-toggle').forEach(function (checkbox) {
        checkbox.addEventListener('change', function () {
            const target = document.querySelector(this.dataset.target);
            if (!target) return;
            target.style.display = this.checked ? 'block' : 'none';
            target.querySelectorAll('textarea, input, select').forEach(function (field) {
                field.required = checkbox.checked;
            });
        });
    });
</script>
</body>
</html>
