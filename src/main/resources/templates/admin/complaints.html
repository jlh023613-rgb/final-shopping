<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投诉管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans SC', sans-serif; }
        .sidebar { background: linear-gradient(180deg, #1a1a2e 0%, #0f3460 100%); min-height: 100vh; padding-top: 1rem; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .sidebar .nav-link i { margin-right: 10px; }
        .content-area { padding: 1.5rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="text-center text-white mb-4">
                <i class="bi bi-shield-lock" style="font-size: 2rem;"></i>
                <h5 class="mt-2">管理员</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2"></i>概览</a>
                <a class="nav-link" href="/admin/merchants"><i class="bi bi-shop"></i>商家管理</a>
                <a class="nav-link active" href="/admin/complaints"><i class="bi bi-exclamation-triangle"></i>投诉管理</a>
                <a class="nav-link" href="/admin/refunds"><i class="bi bi-arrow-return-left"></i>退款管理</a>
                <a class="nav-link" href="/admin/logout"><i class="bi bi-box-arrow-left"></i>退出</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">投诉管理</h4>
                <div>
                    <a href="/admin/complaints" class="btn btn-sm btn-outline-secondary" th:classappend="${currentStatus == null or currentStatus.isEmpty()} ? 'active'">全部</a>
                    <a href="/admin/complaints?status=pending" class="btn btn-sm btn-outline-warning" th:classappend="${currentStatus == 'pending'} ? 'active'">待处理</a>
                    <a href="/admin/complaints?status=handled" class="btn btn-sm btn-outline-success" th:classappend="${currentStatus == 'handled'} ? 'active'">已处理</a>
                </div>
            </div>
            <div th:each="c : ${complaints}" class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <span class="fw-bold" th:text="'投诉人: ' + ${c.username}"></span>
                            <span class="text-secondary ms-3" th:text="'被投诉商家: ' + ${c.merchantShopName}"></span>
                            <span class="badge bg-warning ms-2" th:if="${c.status == 'pending'}">待处理</span>
                            <span class="badge bg-success ms-2" th:if="${c.status == 'handled'}">已处理</span>
                        </div>
                        <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                    </div>
                    <div th:if="${c.orderNo != null}" class="mt-1">
                        <small class="text-secondary">关联订单：<span th:text="${c.orderNo}"></span></small>
                    </div>
                    <p class="mt-2 mb-2" th:text="${c.content}"></p>
                    <div th:if="${c.result != null}" class="bg-light rounded p-2 mt-2">
                        <small class="text-success fw-bold">处理结果：</small>
                        <small th:text="${c.result}"></small>
                    </div>
                    <form th:if="${c.status == 'pending'}" th:action="@{/admin/complaint/handle/{id}(id=${c.id})}" method="post" class="mt-2">
                        <div class="mb-2">
                            <input type="text" name="result" class="form-control form-control-sm" placeholder="输入处理结果..." required>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="form-check me-3">
                                <input type="checkbox" name="closeShop" value="true" class="form-check-input" th:id="'closeShop' + ${c.id}">
                                <label class="form-check-label small" th:for="'closeShop' + ${c.id}">关停店铺</label>
                            </div>
                            <button type="submit" class="btn btn-sm btn-success">处理</button>
                        </div>
                    </form>
                </div>
            </div>
            <div th:if="${complaints == null or complaints.isEmpty()}" class="text-center text-secondary py-5">
                <i class="bi bi-check-circle" style="font-size: 3rem;"></i>
                <p class="mt-2">暂无投诉</p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
