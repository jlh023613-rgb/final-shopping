<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>异常订单列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --primary: #4f8cff;
            --primary-soft: rgba(79, 140, 255, 0.16);
            --success: #3fb950;
            --warning: #d29922;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 228px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
        }
        .sidebar-header {
            padding: 20px 18px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .menu-title {
            padding: 14px 18px 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #6e7681;
            text-transform: uppercase;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: var(--text-sub);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: .2s ease;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(79, 140, 255, 0.12);
            border-left-color: var(--primary);
        }
        .main {
            margin-left: 228px;
            padding: 28px;
        }
        .page-title {
            margin: 0 0 20px;
            font-size: 24px;
            font-weight: 700;
        }
        .page-desc {
            margin: -8px 0 20px;
            color: var(--text-sub);
            font-size: 13px;
        }
        .card-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }
        .table { margin: 0; color: var(--text-main); }
        .table th {
            background: rgba(79, 140, 255, 0.08);
            color: #9ec1ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 14px 16px;
            border-color: var(--border);
            white-space: nowrap;
        }
        .table td {
            padding: 16px;
            border-color: var(--border);
            background: var(--bg-card);
            vertical-align: middle;
        }
        .table tbody tr:hover td { background: var(--bg-card-hover); }
        .issue-type {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .type-complaint { background: rgba(248,81,73,.14); color: #ff938a; }
        .type-refund { background: rgba(79,140,255,.16); color: #9ec1ff; }
        .issue-text { line-height: 1.8; font-size: 13px; }
        .result-text { margin-top: 8px; color: var(--text-sub); font-size: 12px; line-height: 1.7; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-pending { background: rgba(210,153,34,.18); color: #f3c969; }
        .status-handled { background: rgba(63,185,80,.16); color: #7ee787; }
        .btn-go {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid transparent;
        }
        .btn-go.pending {
            background: var(--primary);
            color: #fff;
        }
        .btn-go.handled {
            background: rgba(255,255,255,.06);
            color: #fff;
            border-color: var(--border);
        }
        .empty-box {
            padding: 80px 20px;
            text-align: center;
            color: var(--text-sub);
        }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">管理员控制台</div>
    <div class="menu-title">工作台</div>
    <a class="nav-link" href="/admin/dashboard">概览</a>
    <div class="menu-title">审核管理</div>
    <a class="nav-link" href="/admin/merchants">商家管理</a>
    <a class="nav-link" href="/admin/product-applications">商品申请</a>
    <div class="menu-title">异常订单</div>
    <a class="nav-link active" href="/admin/order-list">异常订单列表</a>
    <a class="nav-link" href="/admin/complaints">投诉管理</a>
    <a class="nav-link" href="/admin/refunds">退款管理</a>
    <div class="menu-title">退出</div>
    <a class="nav-link" href="/admin/logout">退出登录</a>
</div>

<div class="main">
    <h1 class="page-title">异常订单列表</h1>
    <div class="page-desc">这里只展示投诉单和退款单，未处理的记录已经自动排在最前面。</div>

    <div class="card-box">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>序号</th>
                    <th>店铺</th>
                    <th>商品</th>
                    <th>问题</th>
                    <th>处理状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${abnormalOrders}">
                    <td th:text="${item.serialNo}">1</td>
                    <td th:text="${item.shopName}">店铺</td>
                    <td th:text="${item.productName}">商品</td>
                    <td>
                        <div class="issue-type type-complaint" th:if="${item.type == '投诉'}">投诉单</div>
                        <div class="issue-type type-refund" th:if="${item.type == '退款'}">退款单</div>
                        <div class="issue-text" th:text="${item.issue}"></div>
                        <div class="result-text" th:if="${item.result != null and !item.result.isEmpty()}" th:text="'处理结果：' + ${item.result}"></div>
                    </td>
                    <td>
                        <span class="status-badge status-pending" th:if="${!item.handled}">未处理</span>
                        <span class="status-badge status-handled" th:if="${item.handled}">已处理</span>
                    </td>
                    <td>
                        <a th:href="${item.targetUrl}" class="btn-go pending" th:if="${!item.handled}">去处理</a>
                        <a th:href="${item.targetUrl}" class="btn-go handled" th:if="${item.handled}">查看详情</a>
                    </td>
                </tr>
                <tr th:if="${abnormalOrders == null or abnormalOrders.isEmpty()}">
                    <td colspan="6">
                        <div class="empty-box">当前没有投诉或退款异常订单</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
