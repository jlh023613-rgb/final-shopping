<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1117;
            --bg-card: rgba(22, 27, 34, 0.95);
            --primary: #58A6FF;
            --primary-dark: #1f6feb;
            --primary-glow: rgba(88, 166, 255, 0.4);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --input-bg: #0D1117;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
            position: relative;
            padding: 40px 0;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite;
        }
        .star:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .star:nth-child(2) { top: 15%; left: 80%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 25%; left: 35%; animation-delay: 1s; }
        .star:nth-child(4) { top: 30%; left: 65%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 45%; left: 10%; animation-delay: 2s; }
        .star:nth-child(6) { top: 50%; left: 90%; animation-delay: 0.3s; }
        .star:nth-child(7) { top: 60%; left: 25%; animation-delay: 0.8s; }
        .star:nth-child(8) { top: 70%; left: 75%; animation-delay: 1.3s; }
        .star:nth-child(9) { top: 80%; left: 45%; animation-delay: 1.8s; }
        .star:nth-child(10) { top: 85%; left: 55%; animation-delay: 2.3s; }
        .star:nth-child(11) { top: 5%; left: 50%; animation-delay: 0.2s; }
        .star:nth-child(12) { top: 35%; left: 5%; animation-delay: 0.7s; }
        .star:nth-child(13) { top: 55%; left: 95%; animation-delay: 1.2s; }
        .star:nth-child(14) { top: 75%; left: 15%; animation-delay: 1.7s; }
        .star:nth-child(15) { top: 90%; left: 85%; animation-delay: 2.2s; }
        .star:nth-child(16) { top: 20%; left: 40%; animation-delay: 0.4s; }
        .star:nth-child(17) { top: 40%; left: 70%; animation-delay: 0.9s; }
        .star:nth-child(18) { top: 65%; left: 30%; animation-delay: 1.4s; }
        .star:nth-child(19) { top: 85%; left: 60%; animation-delay: 1.9s; }
        .star:nth-child(20) { top: 95%; left: 20%; animation-delay: 2.4s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1); }
        }
        .brand-header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .brand-text {
            color: var(--text-white);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 30px var(--primary-glow), 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        .register-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, var(--primary), transparent 50%, var(--primary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }
        .card-title {
            color: var(--text-white);
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-label {
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-white);
            transition: all 0.2s;
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-control:focus {
            background: var(--input-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            color: var(--text-white);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }
        .form-control[type="file"] {
            padding: 8px 14px;
        }
        .form-control[type="file"]::file-selector-button {
            background: var(--primary);
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            color: white;
            font-size: 12px;
            margin-right: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .form-control[type="file"]::file-selector-button:hover {
            background: var(--primary-dark);
        }
        .btn-register {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #79b8ff 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-1px);
        }
        .alert {
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
            border: 1px solid;
        }
        .alert-danger {
            background: rgba(248, 81, 73, 0.1);
            border-color: rgba(248, 81, 73, 0.3);
            color: #F85149;
        }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .footer-link a:hover {
            color: #79b8ff;
            text-decoration: underline;
        }
        .form-text {
            color: var(--text-muted);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>
    
    <div class="brand-header">
        <div class="brand-text">网上商城</div>
    </div>
    
    <div class="register-card">
        <div class="card-title">商家注册</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form method="post" action="/merchant/register" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码（至少6位）" required minlength="6">
                <div class="form-text">密码长度至少6个字符</div>
            </div>
            <div class="mb-3">
                <label class="form-label">店铺名称</label>
                <input type="text" name="shopName" class="form-control" placeholder="请输入店铺名称" required>
            </div>
            <div class="mb-3">
                <label class="form-label">店铺描述</label>
                <textarea name="shopDescription" class="form-control" rows="3" placeholder="请输入店铺描述（可选）"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">店铺图片（可选）</label>
                <input type="file" name="shopImage" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-register">注册</button>
        </form>
        <div class="footer-link">
            <a href="/merchant/login">已有账号？去登录</a>
        </div>
    </div>
</body>
</html>
