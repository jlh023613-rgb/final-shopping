<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-width: 500px; width: 100%; }
        .btn-register { background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 25px; padding: 10px; font-weight: 600; }
        .btn-register:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<div class="register-card">
    <h3 class="text-center fw-bold mb-4"><i class="bi bi-shop me-2" style="color: #764ba2;"></i>商家注册</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form method="post" action="/merchant/register" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">账号</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
            <label class="form-label">店铺名称</label>
            <input type="text" name="shopName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">店铺描述</label>
            <textarea name="shopDescription" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">店铺图片（可选）</label>
            <input type="file" name="shopImage" class="form-control" accept="image/*">
        </div>
        <button type="submit" class="btn btn-register w-100 mb-3">注册</button>
        <div class="text-center">
            <a href="/merchant/login" class="text-decoration-none" style="color: #764ba2;">已有账号？去登录</a>
        </div>
    </form>
</div>
</body>
</html>
