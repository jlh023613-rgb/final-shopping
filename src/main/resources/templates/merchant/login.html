<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background:
                radial-gradient(circle at 20% 20%, rgba(88,166,255,.18), transparent 32%),
                radial-gradient(circle at 80% 10%, rgba(59,130,246,.12), transparent 30%),
                linear-gradient(135deg, #0d1117 0%, #111827 55%, #0b1220 100%);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-shell {
            width: 100%;
            max-width: 460px;
        }
        .brand {
            text-align: center;
            color: #fff;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 26px;
            text-shadow: 0 0 24px rgba(88,166,255,.24);
        }
        .login-card {
            position: relative;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 24px;
            padding: 38px 34px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,.32);
        }
        .role-badge {
            position: absolute;
            top: -12px;
            right: 24px;
            padding: 6px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-title {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
        }
        .alert {
            border-radius: 14px;
            font-size: 13px;
            margin-bottom: 16px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background: rgba(248,81,73,.12);
            border-color: rgba(248,81,73,.22);
            color: #fecaca;
        }
        .alert-success {
            background: rgba(34,197,94,.12);
            border-color: rgba(34,197,94,.22);
            color: #bbf7d0;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,.72);
            font-size: 13px;
            font-weight: 600;
        }
        .form-control {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(148,163,184,.18);
            border-radius: 14px;
            padding: 13px 14px;
            color: #fff;
            font-size: 14px;
        }
        .form-control::placeholder { color: rgba(255,255,255,.34); }
        .form-control:focus {
            background: rgba(255,255,255,.08);
            color: #fff;
            border-color: #58a6ff;
            box-shadow: 0 0 0 .2rem rgba(88,166,255,.18);
        }
        .btn-login {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: .5px;
            margin-top: 6px;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(37,99,235,.28);
        }
        .links {
            margin-top: 22px;
            text-align: center;
            color: rgba(255,255,255,.62);
            font-size: 13px;
        }
        .links a {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 700;
        }
        .links a:hover { color: #bae6fd; }
    </style>
</head>
<body>
<div class="login-shell">
    <div class="brand">网上商城</div>
    <div class="login-card">
        <div class="role-badge">商家</div>
        <div class="login-title">商家后台登录</div>

        <div th:if="${param.error}" class="alert alert-danger">账号或密码错误，请重新输入。</div>
        <div th:if="${param.pending}" class="alert alert-danger">账号待审核，请等待管理员审核通过。</div>
        <div th:if="${param.rejected}" class="alert alert-danger">账号申请未通过审核，请联系管理员重新处理。</div>
        <div th:if="${param.closed}" class="alert alert-danger">店铺已被关停，暂时不能继续登录。</div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form method="post" action="/merchant/login">
            <div class="form-group">
                <label class="form-label">账号</label>
                <input type="text" name="username" class="form-control" placeholder="请输入商家账号" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入登录密码" required>
            </div>
            <button type="submit" class="btn-login">登录商家后台</button>
        </form>

        <div class="links">
            还没有商家账号？<a href="/merchant/register">去申请入驻</a>
        </div>
    </div>
</div>
</body>
</html>
