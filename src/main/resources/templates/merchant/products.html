<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans SC', sans-serif; }
        .sidebar { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-top: 1rem; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .sidebar .nav-link i { margin-right: 10px; }
        .content-area { padding: 1.5rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="text-center text-white mb-4">
                <i class="bi bi-shop" style="font-size: 2rem;"></i>
                <h5 class="mt-2" th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard"><i class="bi bi-speedometer2"></i>概览</a>
                <a class="nav-link active" href="/merchant/products"><i class="bi bi-box-seam"></i>商品管理</a>
                <a class="nav-link" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
                <a class="nav-link" href="/merchant/reviews"><i class="bi bi-chat-dots"></i>评价管理</a>
                <a class="nav-link" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">商品管理</h4>
                <a href="/merchant/product/add" class="btn btn-primary rounded-pill">
                    <i class="bi bi-plus-circle me-1"></i>添加商品
                </a>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr><th>ID</th><th>图片</th><th>名称</th><th>价格</th><th>库存</th><th>操作</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${products}">
                                <td th:text="${p.id}"></td>
                                <td>
                                    <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" style="width:50px;height:50px;object-fit:contain;border-radius:8px;">
                                </td>
                                <td th:text="${p.name}"></td>
                                <td th:text="'¥' + ${p.price}"></td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <a th:href="@{/merchant/product/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                                    <form th:action="@{/merchant/product/delete/{id}(id=${p.id})}" method="post" style="display:inline;" onsubmit="return confirm('确定删除？')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${products == null or products.isEmpty()}">
                                <td colspan="6" class="text-center text-secondary py-4">暂无商品</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
