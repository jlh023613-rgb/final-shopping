<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --primary: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--bg-dark); color: var(--text-main); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        .sidebar { position: fixed; inset: 0 auto 0 0; width: 228px; background: var(--bg-card); border-right: 1px solid var(--border); }
        .sidebar-header { padding: 20px 18px; border-bottom: 1px solid var(--border); }
        .shop-name { font-size: 18px; font-weight: 700; color: #fff; }
        .shop-meta { margin-top: 6px; font-size: 12px; color: var(--text-sub); }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 11px 18px; color: var(--text-sub); text-decoration: none; border-left: 3px solid transparent; transition: .2s ease; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(88,166,255,.12); border-left-color: var(--primary); }
        .main { margin-left: 228px; padding: 28px; }
        .page-title { margin: 0 0 20px; font-size: 26px; font-weight: 700; }
        .notice {
            margin-bottom: 18px;
            border-radius: 18px;
            padding: 18px 20px;
            border: 1px solid rgba(248,81,73,.25);
            background: rgba(248,81,73,.08);
            color: #ffd7d7;
            line-height: 1.8;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 22px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; }
        .stat-label { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 800; }
        .blue { color: var(--primary); }
        .green { color: var(--success); }
        .orange { color: var(--warning); }
        .red { color: var(--danger); }
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
        .panel-title { padding: 16px 20px; font-size: 16px; font-weight: 700; border-bottom: 1px solid var(--border); }
        .table { margin: 0; color: var(--text-main); }
        .table th, .table td { border-color: var(--border); padding: 14px 16px; background: var(--bg-card); }
        .table th { color: #9ec1ff; background: rgba(88,166,255,.08); font-size: 12px; text-transform: uppercase; }
        .empty-box { padding: 40px 20px; text-align: center; color: var(--text-sub); }
        .status-chip { display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .status-pending { background: rgba(210,153,34,.18); color: #f3c969; }
        .status-shipping { background: rgba(88,166,255,.16); color: #9ec1ff; }
        .status-delivered { background: rgba(63,185,80,.16); color: #7ee787; }
    </style>
    <link href="/css/backend-readable-text.css?v=20260416b" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="shop-name" th:text="${merchant.shopName}">店铺名称</div>
        <div class="shop-meta">
            经营分类：<span th:text="${merchant.category != null ? merchant.category : '未分配'}"></span><br>
            当前状态：<span th:text="${merchant.status == 'closed' ? '已关停' : '正常'}"></span>
        </div>
    </div>
    <a class="nav-link active" href="/merchant/dashboard"><i class="bi bi-grid"></i>概览</a>
    <a class="nav-link" href="/merchant/products"><i class="bi bi-box-seam"></i>商品管理</a>
    <a class="nav-link" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
    <a class="nav-link" href="/merchant/refunds"><i class="bi bi-arrow-counterclockwise"></i>退款管理</a>
    <a class="nav-link" href="/merchant/reviews"><i class="bi bi-chat-square-text"></i>评价管理</a>
    <a class="nav-link" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出登录</a>
</div>

<div class="main">
    <h1 class="page-title">店铺概览</h1>

    <div th:if="${showClosureNotice}" class="notice">
        <div style="font-size: 16px; font-weight: 700; margin-bottom: 6px;">店铺关停公告</div>
        你的店铺当前处于关停状态，商品管理相关操作已暂停。<br>
        关停原因：<span th:text="${closureReason != null ? closureReason : '管理员暂未填写'}"></span><br>
        恢复时间：<span th:text="${closureUntil != null ? #temporals.format(closureUntil, 'yyyy-MM-dd HH:mm') : '待管理员处理'}"></span>
    </div>

    <div th:if="${error}" class="notice" style="border-color: rgba(210,153,34,.25); background: rgba(210,153,34,.08); color: #ffe7b3;" th:text="${error}"></div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">商品总数</div>
            <div class="stat-value blue" th:text="${totalProducts}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">待接单</div>
            <div class="stat-value orange" th:text="${pendingOrders}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">运输中</div>
            <div class="stat-value blue" th:text="${shippingOrders}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">待处理退款</div>
            <div class="stat-value red" th:text="${pendingRefunds}">0</div>
        </div>
    </div>

    <div class="panel mb-4">
        <div class="panel-title">最近订单</div>
        <div class="table-responsive" th:if="${orders != null and !orders.isEmpty()}">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>订单号</th>
                    <th>商品</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>时间</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderNo}">订单号</td>
                    <td th:text="${order.productName}">商品</td>
                    <td th:text="${'￥' + order.totalPrice}">￥0</td>
                    <td>
                        <span class="status-chip status-pending" th:if="${order.status == 'pending'}">待接单</span>
                        <span class="status-chip status-shipping" th:if="${order.status == 'shipping'}">运输中</span>
                        <span class="status-chip status-delivered" th:if="${order.status == 'delivered' or order.status == 'completed' or order.status == 'reviewed'}">已发货/已完成</span>
                    </td>
                    <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${orders == null or orders.isEmpty()}" class="empty-box">最近还没有订单数据</div>
    </div>

    <div class="panel" th:if="${reviews != null and !reviews.isEmpty()}">
        <div class="panel-title">最新评价</div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>用户</th>
                    <th>评分</th>
                    <th>评价内容</th>
                    <th>时间</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.username}">用户</td>
                    <td th:text="${review.rating + ' 星'}">5 星</td>
                    <td th:text="${review.content}">评价内容</td>
                    <td th:text="${review.createdAt != null ? #temporals.format(review.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
