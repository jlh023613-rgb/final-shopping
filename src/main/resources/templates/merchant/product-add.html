<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>添加商品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans SC', sans-serif; }
        .sidebar { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-top: 1rem; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .sidebar .nav-link i { margin-right: 10px; }
        .content-area { padding: 1.5rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="text-center text-white mb-4">
                <i class="bi bi-shop" style="font-size: 2rem;"></i>
                <h5 class="mt-2" th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard"><i class="bi bi-speedometer2"></i>概览</a>
                <a class="nav-link active" href="/merchant/products"><i class="bi bi-box-seam"></i>商品管理</a>
                <a class="nav-link" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
                <a class="nav-link" href="/merchant/reviews"><i class="bi bi-chat-dots"></i>评价管理</a>
                <a class="nav-link" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <h4 class="mb-4 fw-bold">添加商品</h4>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form method="post" action="/merchant/product/add" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">商品名称</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">价格</label>
                                <input type="number" name="price" class="form-control" step="0.01" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">原价</label>
                                <input type="number" name="originalPrice" class="form-control" step="0.01">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">库存</label>
                            <input type="number" name="stock" class="form-control" value="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">商品描述</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">商品图片</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary">添加商品</button>
                        <a href="/merchant/products" class="btn btn-outline-secondary ms-2">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
