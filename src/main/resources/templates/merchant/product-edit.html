<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>编辑商品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --primary: #58a6ff;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
            --danger: #f85149;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 228px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 20px 18px;
            border-bottom: 1px solid var(--border);
        }

        .shop-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .shop-meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-sub);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: var(--text-sub);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: .2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(88, 166, 255, .12);
            border-left-color: var(--primary);
        }

        .main {
            margin-left: 228px;
            padding: 28px;
        }

        .page-title {
            margin: 0 0 18px;
            font-size: 26px;
            font-weight: 700;
        }

        .notice {
            margin-bottom: 18px;
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid rgba(248, 81, 73, .25);
            background: rgba(248, 81, 73, .08);
            color: #ffd7d7;
            line-height: 1.8;
            font-size: 13px;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            max-width: 980px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .section-sub {
            color: var(--text-sub);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #fff;
            margin-bottom: 8px;
        }

        .form-control {
            background: #0f141b;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 11px 13px;
            font-size: 13px;
        }

        .form-control:focus {
            background: #0f141b;
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(88, 166, 255, .18);
        }

        .form-text {
            color: var(--text-sub);
            font-size: 12px;
        }

        .current-image {
            width: 140px;
            height: 140px;
            border-radius: 18px;
            object-fit: cover;
            background: #0f141b;
            border: 1px solid var(--border);
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn-main,
        .btn-sub {
            border: none;
            border-radius: 14px;
            padding: 11px 18px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-main {
            background: var(--primary);
            color: #fff;
        }

        .btn-sub {
            background: rgba(255, 255, 255, .06);
            color: #fff;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="shop-name" th:text="${merchant.shopName}">店铺名称</div>
        <div class="shop-meta">
            经营分类：<span th:text="${merchant.category != null ? merchant.category : '未分配'}"></span><br>
            当前状态：<span th:text="${merchant.status == 'closed' ? '已关停' : '正常'}"></span>
        </div>
    </div>
    <a class="nav-link" href="/merchant/dashboard"><i class="bi bi-grid"></i>概览</a>
    <a class="nav-link active" href="/merchant/products"><i class="bi bi-box-seam"></i>商品管理</a>
    <a class="nav-link" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
    <a class="nav-link" href="/merchant/refunds"><i class="bi bi-arrow-counterclockwise"></i>退款管理</a>
    <a class="nav-link" href="/merchant/reviews"><i class="bi bi-chat-square-text"></i>评价管理</a>
    <a class="nav-link" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出登录</a>
</div>

<div class="main">
    <h1 class="page-title">编辑商品</h1>

    <div th:if="${showClosureNotice}" class="notice">
        店铺目前处于关停状态，暂时不能编辑商品。<br>
        关停原因：<span th:text="${closureReason != null ? closureReason : '管理员暂未填写'}"></span><br>
        恢复时间：<span th:text="${closureUntil != null ? #temporals.format(closureUntil, 'yyyy-MM-dd HH:mm') : '待管理员处理'}"></span>
    </div>

    <div class="form-card">
        <div class="section-title">修改商品信息</div>
        <div class="section-sub">规格参数、产品特点、包装清单会同步更新到前台商品详情页。</div>

        <form method="post" th:action="@{/merchant/product/edit/{id}(id=${product.id})}" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">商品名称</label>
                <input type="text" name="name" class="form-control" th:value="${product.name}" required>
            </div>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">售价</label>
                    <input type="number" name="price" class="form-control" step="0.01" min="0" th:value="${product.price}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">划线价</label>
                    <input type="number" name="originalPrice" class="form-control" step="0.01" min="0" th:value="${product.originalPrice}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">库存</label>
                    <input type="number" name="stock" class="form-control" min="0" th:value="${product.stock}">
                </div>
            </div>

            <div class="mt-3 mb-3">
                <label class="form-label">商品描述</label>
                <textarea name="description" class="form-control" rows="5" th:text="${product.description}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">规格参数</label>
                <textarea name="specifications" class="form-control" rows="4" th:text="${product.specifications}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">产品特点</label>
                <textarea name="features" class="form-control" rows="4" th:text="${product.features}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">包装清单</label>
                <textarea name="packagingList" class="form-control" rows="3" th:text="${product.packagingList}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">当前图片</label>
                <div class="mt-2">
                    <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" th:src="${product.imageUrl}" class="current-image" alt="商品图">
                    <div th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" class="form-text">当前没有商品图片</div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">更换图片</label>
                <input type="file" name="imageFile" class="form-control" accept="image/*">
                <div class="form-text">如果不上传新图片，将保留当前图片。</div>
            </div>

            <div class="action-row">
                <button type="submit" class="btn-main">保存修改</button>
                <a href="/merchant/products" class="btn-sub">返回商品管理</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
