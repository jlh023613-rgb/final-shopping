<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>评价管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans SC', sans-serif; }
        .sidebar { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-top: 1rem; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .sidebar .nav-link i { margin-right: 10px; }
        .content-area { padding: 1.5rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="text-center text-white mb-4">
                <i class="bi bi-shop" style="font-size: 2rem;"></i>
                <h5 class="mt-2" th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard"><i class="bi bi-speedometer2"></i>概览</a>
                <a class="nav-link" href="/merchant/products"><i class="bi bi-box-seam"></i>商品管理</a>
                <a class="nav-link" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
                <a class="nav-link active" href="/merchant/reviews"><i class="bi bi-chat-dots"></i>评价管理</a>
                <a class="nav-link" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <h4 class="mb-4 fw-bold">评价管理</h4>
            <div th:if="${reviews == null or reviews.isEmpty()}" class="text-center text-secondary py-5">
                <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                <p class="mt-2">暂无评价</p>
            </div>
            <div th:each="review : ${reviews}" class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong th:text="${review.username}"></strong>
                            <span class="text-warning ms-2">
                                <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                            </span>
                            <span class="text-secondary ms-2" th:text="${review.productName}"></span>
                        </div>
                        <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></small>
                    </div>
                    <p class="mt-2 mb-2" th:text="${review.content}"></p>
                    <div th:if="${review.merchantReply != null}" class="bg-light rounded p-2 mt-2">
                        <small class="text-primary fw-bold">商家回复：</small>
                        <small th:text="${review.merchantReply}"></small>
                    </div>
                    <form th:if="${review.merchantReply == null}" th:action="@{/merchant/review/reply/{id}(id=${review.id})}" method="post" class="mt-2">
                        <div class="input-group">
                            <input type="text" name="merchantReply" class="form-control form-control-sm" placeholder="回复评价..." required>
                            <button type="submit" class="btn btn-sm btn-primary">回复</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
