<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .brand {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
            font-size: 22px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }
        .form-control {
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .form-control:focus {
            background: #fff;
            box-shadow: none;
            border-bottom-color: #2563eb;
        }
        .form-control::placeholder {
            color: #aaa;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a1a2e 0%, #2563eb 100%);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
            color: white;
        }
        .alert {
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #666;
        }
        .register-link {
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="brand">网上商城</div>
<div class="login-card">
    <h3 class="login-title">登录账号</h3>
    
    <div th:if="${param.error}" class="alert alert-danger">
        手机号或密码错误
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        注册成功，请登录
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
        已退出登录
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="text" name="phone" class="form-control" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-login">登录</button>
    </form>

    <div class="links">
        还没有账号？<a href="/user/register" class="register-link">立即注册</a>
    </div>
</div>
</body>
</html>
