<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-top: #08111f;
            --bg-bottom: #14253f;
            --glass: rgba(11, 23, 42, 0.78);
            --glass-border: rgba(148, 163, 184, 0.18);
            --primary: #3b82f6;
            --primary-strong: #2563eb;
            --danger: #f87171;
            --text-main: #f8fafc;
            --text-sub: rgba(226, 232, 240, 0.72);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background:
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18), transparent 32%),
                radial-gradient(circle at 80% 0%, rgba(14, 165, 233, 0.16), transparent 28%),
                linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .register-shell {
            width: 100%;
            max-width: 460px;
        }

        .brand {
            text-align: center;
            color: #fff;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 24px;
            text-shadow: 0 0 24px rgba(59, 130, 246, 0.28);
        }

        .register-card {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 38px 34px 30px;
            backdrop-filter: blur(18px);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
        }

        .role-badge {
            position: absolute;
            top: -12px;
            right: 24px;
            padding: 6px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .register-title {
            margin: 0 0 24px;
            text-align: center;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 800;
        }

        .alert {
            border-radius: 14px;
            font-size: 13px;
            margin-bottom: 16px;
            border: 1px solid rgba(248, 113, 113, 0.22);
            background: rgba(248, 113, 113, 0.12);
            color: #fecaca;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 600;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 14px;
            padding: 13px 14px;
            color: #fff;
            font-size: 14px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.34);
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: #60a5fa;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.18);
        }

        .form-select option {
            background: #0f172a;
            color: #fff;
        }

        .error-text,
        .helper-text {
            font-size: 12px;
            margin-top: 6px;
        }

        .error-text {
            color: #fecaca;
        }

        .helper-text {
            color: rgba(226, 232, 240, 0.58);
        }

        .password-strength {
            height: 4px;
            border-radius: 999px;
            margin-top: 8px;
            background: rgba(148, 163, 184, 0.22);
            overflow: hidden;
        }

        .password-strength span {
            display: block;
            height: 100%;
            width: 0;
            border-radius: 999px;
            transition: width 0.2s ease, background 0.2s ease;
        }

        .btn-register {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-strong));
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            margin-top: 8px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 24px rgba(37, 99, 235, 0.24);
        }

        .links {
            margin-top: 22px;
            text-align: center;
            color: rgba(226, 232, 240, 0.62);
            font-size: 13px;
        }

        .links a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 700;
        }

        .links a:hover {
            color: #dbeafe;
        }

        .modal-content {
            background: rgba(9, 17, 32, 0.96);
            color: #fff;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 20px;
        }

        .modal-header,
        .modal-footer {
            border-color: rgba(148, 163, 184, 0.14);
        }

        .btn-close {
            filter: invert(1);
        }

        .captcha-box {
            display: inline-block;
            padding: 8px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .captcha-input.is-invalid {
            border-color: var(--danger);
        }
    </style>
</head>
<body>
<div class="register-shell">
    <div class="brand">网上商城</div>
    <div class="register-card">
        <div class="role-badge">用户</div>
        <h1 class="register-title">创建账号</h1>

        <div th:if="${error}" class="alert" th:text="${error}"></div>

        <form id="registerForm" th:action="@{/user/register}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input id="username" type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">手机号</label>
                <input id="phone" type="text" name="phone" class="form-control" placeholder="请输入手机号" required>
                <div id="phoneError" class="error-text"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input id="password" type="password" name="password" class="form-control" placeholder="请输入 12 到 16 位密码" minlength="12" maxlength="16" required>
                <div class="password-strength"><span id="strengthBar"></span></div>
                <div id="strengthText" class="helper-text"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">确认密码</label>
                <input id="confirmPassword" type="password" name="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
                <div id="confirmError" class="error-text"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="gender">性别</label>
                <select id="gender" name="gender" class="form-select">
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
            </div>

            <button type="button" class="btn-register" onclick="showCaptchaModal()">注册账号</button>
        </form>

        <div class="links">
            已有账号？<a href="/user/login">立即登录</a>
        </div>
    </div>
</div>

<div class="modal fade" id="captchaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">请输入验证码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body text-center">
                <div class="captcha-box mb-3">
                    <canvas id="captchaCanvas" width="160" height="56" style="cursor: pointer;" onclick="generateCaptcha()"></canvas>
                </div>
                <div class="helper-text mb-3">点击验证码图片可以刷新</div>
                <input id="captchaInput" type="text" class="form-control text-center captcha-input" placeholder="请输入验证码" maxlength="4">
                <div id="captchaError" class="error-text"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitForm()">确认注册</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let captchaCode = "";

    function generateCaptcha() {
        const canvas = document.getElementById("captchaCanvas");
        const ctx = canvas.getContext("2d");
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        captchaCode = "";
        for (let i = 0; i < 4; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            captchaCode += char;
            ctx.save();
            ctx.translate(28 + i * 32, 32);
            ctx.rotate((Math.random() - 0.5) * 0.35);
            ctx.font = "bold 28px Arial";
            ctx.fillStyle = `rgb(${110 + Math.random() * 120}, ${140 + Math.random() * 90}, ${190 + Math.random() * 60})`;
            ctx.fillText(char, 0, 0);
            ctx.restore();
        }

        for (let i = 0; i < 6; i++) {
            ctx.strokeStyle = `rgba(${80 + Math.random() * 100}, ${120 + Math.random() * 100}, 255, 0.35)`;
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.stroke();
        }

        document.getElementById("captchaInput").value = "";
        document.getElementById("captchaInput").classList.remove("is-invalid");
        document.getElementById("captchaError").textContent = "";
    }

    function validatePhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }

    function countPasswordTypes(password) {
        let types = 0;
        if (/[a-z]/.test(password)) types++;
        if (/[A-Z]/.test(password)) types++;
        if (/[0-9]/.test(password)) types++;
        if (/[^a-zA-Z0-9]/.test(password)) types++;
        return types;
    }

    function updateStrengthBar() {
        const password = document.getElementById("password").value;
        const strengthBar = document.getElementById("strengthBar");
        const strengthText = document.getElementById("strengthText");
        const types = countPasswordTypes(password);

        if (!password) {
            strengthBar.style.width = "0";
            strengthText.textContent = "";
            return;
        }

        if (types <= 1) {
            strengthBar.style.width = "34%";
            strengthBar.style.background = "#ef4444";
            strengthText.textContent = "密码偏弱，请至少包含两种字符组合";
        } else if (types === 2) {
            strengthBar.style.width = "67%";
            strengthBar.style.background = "#f59e0b";
            strengthText.textContent = "密码强度中等";
        } else {
            strengthBar.style.width = "100%";
            strengthBar.style.background = "#22c55e";
            strengthText.textContent = "密码强度良好";
        }
    }

    function validateForm() {
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const phoneError = document.getElementById("phoneError");
        const confirmError = document.getElementById("confirmError");

        phoneError.textContent = "";
        confirmError.textContent = "";

        if (!validatePhone(phone)) {
            phoneError.textContent = "请输入正确的手机号格式";
            return false;
        }

        if (password.length < 12 || password.length > 16) {
            alert("密码长度必须在 12 到 16 位之间");
            return false;
        }

        if (countPasswordTypes(password) <= 1) {
            alert("密码强度太弱，请至少包含大小写字母、数字、特殊字符中的两种");
            return false;
        }

        if (password !== confirmPassword) {
            confirmError.textContent = "两次输入的密码不一致";
            return false;
        }

        return true;
    }

    function showCaptchaModal() {
        if (!validateForm()) {
            return;
        }
        generateCaptcha();
        const modal = new bootstrap.Modal(document.getElementById("captchaModal"));
        modal.show();
    }

    function submitForm() {
        const inputEl = document.getElementById("captchaInput");
        const errorEl = document.getElementById("captchaError");
        const inputValue = inputEl.value.trim().toUpperCase();

        if (inputValue !== captchaCode) {
            generateCaptcha();
            inputEl.classList.add("is-invalid");
            errorEl.textContent = "验证码错误，请重新输入";
            return;
        }

        inputEl.classList.remove("is-invalid");
        errorEl.textContent = "";
        bootstrap.Modal.getInstance(document.getElementById("captchaModal")).hide();
        document.getElementById("registerForm").submit();
    }

    document.getElementById("password").addEventListener("input", updateStrengthBar);
    document.getElementById("confirmPassword").addEventListener("input", function () {
        const errorEl = document.getElementById("confirmError");
        errorEl.textContent = this.value && this.value !== document.getElementById("password").value
            ? "两次输入的密码不一致"
            : "";
    });
    document.getElementById("phone").addEventListener("blur", function () {
        document.getElementById("phoneError").textContent = this.value && !validatePhone(this.value)
            ? "请输入正确的手机号格式"
            : "";
    });
    document.getElementById("captchaInput").addEventListener("input", function () {
        this.classList.remove("is-invalid");
        document.getElementById("captchaError").textContent = "";
    });
</script>
</body>
</html>
