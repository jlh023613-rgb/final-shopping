<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网上商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #E4393C;
            --primary-dark: #C81623;
            --primary-light: #FFF0F0;
            --accent: #FF6B35;
            --bg: #F4F4F4;
            --border: #e8e8e8;
            --text-dark: #333;
            --text-secondary: #666;
            --text-muted: #999;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background-color: var(--bg); color: var(--text-dark); font-size: 14px; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); border-radius: 4px; }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }
        .text-primary { color: var(--primary) !important; }
        .bg-primary { background-color: var(--primary) !important; }
        .border-primary { border-color: var(--primary) !important; }
    </style>
</head>
<body>

<div th:fragment="topbar" class="topbar" style="background: linear-gradient(120deg, #b90f1f 0%, #d81f2d 56%, #bf1021 100%); height: 40px; line-height: 40px; font-size: 12px;">
    <div class="container d-flex justify-content-between align-items-center" style="height: 100%;">
        <span class="topbar-welcome" style="color: rgba(255,255,255,0.95);">欢迎来到网上商城 | 免费注册享优惠</span>
        <span class="topbar-actions" style="display: flex; align-items: center;">
            <a href="/merchant/login" class="topbar-btn topbar-btn-merchant">🏪 商家入口</a>
            <a href="/admin/login" class="topbar-btn topbar-btn-admin">🔧 管理员入口</a>
        </span>
    </div>
</div>

<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-light bg-white sticky-top" style="border-bottom: 1px solid #ddd; padding: 0; top: 40px;">
    <div class="container" style="height: 60px; display: flex; align-items: center;">
        <a class="navbar-brand" href="/" style="color: var(--primary); font-weight: 700; font-size: 1.4rem; padding: 0;">
            网上商城
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="padding: 4px 8px;">
            <span class="navbar-toggler-icon" style="width: 20px; height: 20px;"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav" style="display: flex; align-items: center;">
            <form class="d-flex mx-auto" action="/" method="get" style="width: 500px; max-width: 100%;">
                <div class="input-group">
                    <input type="text" class="form-control" name="keyword" placeholder="搜索商品..." th:value="${keyword}" style="border-radius: 20px 0 0 20px; border: 2px solid var(--primary); border-right: none; padding: 8px 16px;">
                    <button class="btn text-white" type="submit" style="background-color: var(--primary); border-color: var(--primary); border-radius: 0 20px 20px 0; padding: 8px 24px; font-weight: 500;">
                        搜索
                    </button>
                </div>
            </form>
            <div class="d-flex align-items-center" style="font-size: 13px;">
                <span th:if="${user == null}" class="d-flex align-items-center auth-link-group" style="gap: 8px;">
                    <a href="/user/login" class="nav-btn-login nav-cta">登录</a>
                    <a href="/user/register" class="nav-btn-register nav-cta">注册</a>
                </span>
                <span th:if="${user != null}" class="d-flex align-items-center">
                    <a href="/cart" class="nav-link-hover text-decoration-none me-3" style="color: var(--text-secondary);">
                        <i class="bi bi-cart3 me-1"></i>购物车<span class="cart-badge" style="display:none; background: var(--primary); color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px; vertical-align: middle;">0</span>
                    </a>
                    <a href="/user/center" class="nav-link-hover text-decoration-none me-3" style="color: var(--text-secondary);">用户中心</a>
                    <a href="/user/orders" class="nav-link-hover text-decoration-none me-3" style="color: var(--text-secondary);">我的订单</a>
                    <a href="/user/logout" style="color: var(--text-muted);">退出</a>
                </span>
            </div>
        </div>
    </div>
</nav>

<style>
    .nav-link-hover:hover { color: var(--primary) !important; }
    .topbar-actions {
        gap: 10px;
    }
    .topbar-welcome {
        letter-spacing: 0.2px;
    }
    .topbar-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-decoration: none;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background-color 0.25s ease;
        line-height: 1;
        border: 1px solid rgba(255,255,255,0.78);
        color: #FFFFFF;
        background: rgba(255, 255, 255, 0.17);
        backdrop-filter: blur(10px) saturate(140%);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }
    .topbar-btn:hover {
        transform: translateY(-1px) scale(1.03);
        color: #FFFFFF;
        background: rgba(255,255,255,0.28);
        border-color: rgba(255,255,255,0.95);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
    }
    .topbar-btn-merchant {
        background: linear-gradient(140deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.12) 100%);
    }
    .topbar-btn-admin {
        background: linear-gradient(140deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.14) 100%);
    }
    .auth-link-group {
        gap: 10px !important;
    }
    .nav-cta {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 82px;
        padding: 7px 20px;
        border-radius: 999px;
        font-size: 13px;
        text-decoration: none;
        transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease, background-color 0.28s ease;
    }
    .nav-cta::after {
        content: "";
        position: absolute;
        top: -120%;
        left: -25%;
        width: 35%;
        height: 320%;
        transform: rotate(24deg);
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.65) 50%, rgba(255,255,255,0) 100%);
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
    }
    .nav-cta:hover::after {
        opacity: 1;
        animation: ctaSheen 0.75s ease;
    }
    .nav-btn-login {
        background: rgba(255,255,255,0.96);
        color: var(--primary);
        border: 1px solid rgba(228,57,60,0.25);
        font-weight: 600;
        box-shadow: 0 10px 20px rgba(228,57,60,0.12);
        backdrop-filter: blur(6px);
    }
    .nav-btn-login:hover {
        background: #ffffff;
        color: var(--primary);
        border-color: rgba(228,57,60,0.45);
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 14px 26px rgba(228,57,60,0.22);
    }
    .nav-btn-register {
        background: linear-gradient(135deg, #ff5f5f 0%, var(--primary) 58%, #be1621 100%);
        color: #FFFFFF;
        border: 1px solid rgba(199, 25, 41, 0.95);
        font-weight: 600;
        box-shadow: 0 12px 24px rgba(228,57,60,0.34);
    }
    .nav-btn-register:hover {
        background: linear-gradient(135deg, #ff6c6c 0%, #db2632 55%, #b41220 100%);
        border-color: #b41220;
        color: #FFFFFF;
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 16px 30px rgba(228,57,60,0.4);
    }
    @media (max-width: 991.98px) {
        .topbar {
            height: auto !important;
            min-height: 44px;
            line-height: 1.25 !important;
            padding: 6px 0;
        }
        .topbar .container {
            gap: 8px;
        }
        .topbar-welcome {
            display: none;
        }
        .topbar-actions {
            width: 100%;
            justify-content: flex-end;
        }
        .topbar-btn {
            min-height: 30px;
            padding: 6px 12px;
        }
        nav.navbar.sticky-top {
            top: 44px !important;
        }
    }
    @media (max-width: 575.98px) {
        .auth-link-group {
            width: 100%;
            justify-content: flex-end;
        }
        .nav-cta {
            min-width: 72px;
            padding: 6px 16px;
        }
    }
    @keyframes ctaSheen {
        from { transform: translateX(-150%) rotate(24deg); }
        to { transform: translateX(420%) rotate(24deg); }
    }
</style>

<footer th:fragment="footer" style="background: #333; color: #aaa; text-align: center; padding: 20px 0; margin-top: 40px; font-size: 12px;">
    <div class="container">
        <div style="margin-bottom: 8px;">
            <a href="#" style="color: #aaa; margin: 0 15px;">关于我们</a>
            <a href="#" style="color: #aaa; margin: 0 15px;">联系客服</a>
            <a href="#" style="color: #aaa; margin: 0 15px;">帮助中心</a>
        </div>
        <div>&copy; 2024 网上商城 版权所有</div>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
        });
        
        function updateCartBadge() {
            var badge = document.querySelector('.cart-badge');
            if (!badge) return;
            
            fetch('/cart/count')
                .then(response => response.json())
                .then(data => {
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(() => {
                    badge.style.display = 'none';
                });
        }
    </script>
</div>

</body>
</html>
